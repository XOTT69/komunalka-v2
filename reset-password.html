<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Скидання пароля</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --brand-main: #007aff;
      --brand-hover: #005bb5;
      --brand-light: rgba(0, 122, 255, 0.1);
      --brand-border: rgba(0, 122, 255, 0.25);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #f2f2f7;
    }
  </style>
</head>
<body class="min-h-screen bg-[#f2f2f7] text-slate-800 flex items-center justify-center p-5">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.08)] p-6 border border-slate-100 relative overflow-hidden">
      <div class="absolute -top-20 -right-20 w-40 h-40 rounded-full blur-3xl pointer-events-none" style="background: var(--brand-light)"></div>

      <div class="relative z-10">
        <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6"></div>

        <div class="text-center mb-8">
          <div class="w-20 h-20 mx-auto mb-5 rounded-[2rem] flex items-center justify-center text-4xl text-white shadow-xl" style="background: linear-gradient(135deg, var(--brand-main), var(--brand-hover));">
            🔐
          </div>
          <h1 class="text-3xl font-black text-slate-900 mb-2 tracking-tight">Скидання пароля</h1>
          <p class="text-slate-500 text-base">Введи новий пароль для свого акаунта</p>
        </div>

        <div id="tokenErrorBox" class="hidden mb-4 p-4 rounded-2xl bg-red-50 border border-red-100 text-red-500 text-sm font-bold text-center"></div>
        <div id="successBox" class="hidden mb-4 p-4 rounded-2xl bg-green-50 border border-green-100 text-green-600 text-sm font-bold text-center"></div>

        <form id="resetForm" class="space-y-4">
          <div>
            <label class="block text-[11px] font-bold uppercase text-slate-400 mb-1.5 ml-2 tracking-wider">Новий пароль</label>
            <input
              type="password"
              id="newPassword"
              placeholder="••••••••"
              class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-base font-bold outline-none focus:ring-2 text-slate-900"
              style="focus-ring-color: var(--brand-main);"
              required
            />
          </div>

          <div>
            <label class="block text-[11px] font-bold uppercase text-slate-400 mb-1.5 ml-2 tracking-wider">Повторіть пароль</label>
            <input
              type="password"
              id="confirmPassword"
              placeholder="••••••••"
              class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-base font-bold outline-none focus:ring-2 text-slate-900"
              required
            />
          </div>

          <p id="formError" class="hidden text-red-500 text-sm text-center font-bold bg-red-50 p-3 rounded-xl"></p>

          <button
            type="submit"
            id="submitBtn"
            class="w-full text-white font-bold py-4 rounded-2xl shadow-lg transition-transform active:scale-[0.97] text-lg tracking-wide"
            style="background: var(--brand-main);"
          >
            Змінити пароль
          </button>

          <button
            type="button"
            id="goLoginBtn"
            onclick="goToLogin()"
            class="w-full bg-slate-100 text-slate-700 font-bold py-4 rounded-2xl border border-slate-200 text-lg tracking-wide"
          >
            Перейти до входу
          </button>
        </form>
      </div>
    </div>
  </div>

  <script>
    const WORKER_URL = 'https://komunalka-v2-api.mikolenko-anton1.workers.dev';

    const token = new URLSearchParams(window.location.search).get('token') || '';

    const resetForm = document.getElementById('resetForm');
    const newPassword = document.getElementById('newPassword');
    const confirmPassword = document.getElementById('confirmPassword');
    const submitBtn = document.getElementById('submitBtn');
    const formError = document.getElementById('formError');
    const tokenErrorBox = document.getElementById('tokenErrorBox');
    const successBox = document.getElementById('successBox');

    function showFormError(msg) {
      formError.textContent = msg;
      formError.classList.remove('hidden');
    }

    function hideFormError() {
      formError.classList.add('hidden');
      formError.textContent = '';
    }

    function showTokenError(msg) {
      tokenErrorBox.textContent = msg;
      tokenErrorBox.classList.remove('hidden');
      resetForm.classList.add('hidden');
    }

    function showSuccess(msg) {
      successBox.textContent = msg;
      successBox.classList.remove('hidden');
    }

    function goToLogin() {
      window.location.href = './index.html';
    }

    async function apiResetPassword(token, password) {
      const res = await fetch(`${WORKER_URL}/api/auth/reset-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password })
      });

      const raw = await res.text();
      let data = null;

      try {
        data = raw ? JSON.parse(raw) : null;
      } catch {
        throw new Error(raw || 'INVALID_SERVER_RESPONSE');
      }

      if (!res.ok || !data?.success) {
        throw new Error(data?.details || data?.error || `HTTP_${res.status}`);
      }

      return data;
    }

    if (!token) {
      showTokenError('Токен відсутній або посилання некоректне');
    }

    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideFormError();

      const pass1 = newPassword.value.trim();
      const pass2 = confirmPassword.value.trim();

      if (!token) return showFormError('Токен відсутній');
      if (!pass1 || !pass2) return showFormError('Заповни обидва поля');
      if (pass1.length < 4) return showFormError('Пароль має бути мінімум 4 символи');
      if (pass1 !== pass2) return showFormError('Паролі не співпадають');

      submitBtn.disabled = true;
      submitBtn.textContent = 'Збереження...';

      try {
        await apiResetPassword(token, pass1);
        resetForm.classList.add('hidden');
        showSuccess('Пароль успішно змінено. Тепер можна увійти з новим паролем.');
      } catch (err) {
        showFormError(
          err.message === 'INVALID_OR_EXPIRED_TOKEN' ? 'Токен недійсний або вже протермінований' :
          err.message === 'NOT_FOUND' ? 'Користувача не знайдено' :
          err.message === 'MISSING_FIELDS' ? 'Не вистачає даних для скидання' :
          err.message
        );
        submitBtn.disabled = false;
        submitBtn.textContent = 'Змінити пароль';
      }
    });
  </script>
</body>
</html>
