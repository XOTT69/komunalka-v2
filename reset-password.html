<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Скидання пароля</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              DEFAULT: '#2563eb',
              hover: '#1d4ed8',
              light: 'rgba(37,99,235,.1)'
            },
            apple: {
              dark: '#1c1c1e',
              darker: '#000000',
              light: '#f2f2f7'
            }
          },
          boxShadow: {
            soft: '0 10px 40px -10px rgba(0, 0, 0, 0.08)'
          }
        }
      }
    }
  </script>
  <meta name="theme-color" content="#f2f2f7" id="metaThemeColor" />
  <style>
    html, body {
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
  </style>
</head>
<body class="bg-apple-light text-slate-800 min-h-screen flex items-center justify-center p-5">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="w-24 h-24 bg-gradient-to-br from-brand to-brand-hover rounded-[2.25rem] flex items-center justify-center mx-auto mb-6 shadow-2xl text-white text-5xl">🔐</div>
      <h1 class="text-3xl font-black text-slate-900 mb-2 tracking-tight">Новий пароль</h1>
      <p class="text-slate-500 font-medium text-sm">Встановіть новий пароль для акаунта</p>
    </div>

    <div class="bg-white p-8 rounded-[2.5rem] shadow-soft border border-slate-100 relative overflow-hidden">
      <div class="absolute -top-20 -right-20 w-40 h-40 bg-brand-light rounded-full blur-3xl pointer-events-none"></div>

      <form id="resetForm" class="space-y-4 relative z-10">
        <div id="tokenErrorBox" class="hidden text-red-500 text-sm text-center font-bold bg-red-50 p-3 rounded-xl"></div>

        <div>
          <label class="block text-[11px] font-bold uppercase text-slate-400 mb-1.5 ml-2 tracking-wider">Новий пароль</label>
          <input
            type="password"
            id="newPassword"
            placeholder="••••••••"
            required
            class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-base font-bold outline-none focus:ring-2 focus:ring-brand text-slate-900 transition-all shadow-inner"
          />
        </div>

        <div>
          <label class="block text-[11px] font-bold uppercase text-slate-400 mb-1.5 ml-2 tracking-wider">Повторіть пароль</label>
          <input
            type="password"
            id="confirmPassword"
            placeholder="••••••••"
            required
            class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-base font-bold outline-none focus:ring-2 focus:ring-brand text-slate-900 transition-all shadow-inner"
          />
        </div>

        <p id="formError" class="hidden text-red-500 text-sm text-center font-bold bg-red-50 p-3 rounded-xl"></p>
        <p id="formSuccess" class="hidden text-green-600 text-sm text-center font-bold bg-green-50 p-3 rounded-xl"></p>

        <button
          type="submit"
          id="submitBtn"
          class="w-full bg-brand hover:bg-brand-hover text-white font-bold py-4 rounded-2xl shadow-lg transition-transform active:scale-[0.96] text-lg tracking-wide mt-4"
        >
          Зберегти новий пароль
        </button>

        <a
          id="backToLogin"
          href="./index.html"
          class="block text-center w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-4 rounded-2xl transition-transform active:scale-[0.96] text-base tracking-wide"
        >
          Повернутись до входу
        </a>
      </form>
    </div>
  </div>

  <script>
    const WORKER_URL = 'https://komunalka-v2-api.mikolenko-anton1.workers.dev';

    const $ = id => document.getElementById(id);
    const params = new URLSearchParams(location.search);
    const token = params.get('token') || '';

    function showError(msg) {
      $('formError').innerText = msg;
      $('formError').classList.remove('hidden');
    }

    function hideError() {
      $('formError').classList.add('hidden');
      $('formError').innerText = '';
    }

    function showSuccess(msg) {
      $('formSuccess').innerText = msg;
      $('formSuccess').classList.remove('hidden');
    }

    function hideSuccess() {
      $('formSuccess').classList.add('hidden');
      $('formSuccess').innerText = '';
    }

    if (!token) {
      $('tokenErrorBox').innerText = 'Немає токена скидання пароля';
      $('tokenErrorBox').classList.remove('hidden');
      $('submitBtn').disabled = true;
      $('submitBtn').classList.add('opacity-50', 'cursor-not-allowed');
    }

    $('resetForm').addEventListener('submit', async e => {
      e.preventDefault();
      hideError();
      hideSuccess();

      if (!token) {
        showError('Немає токена скидання');
        return;
      }

      const newPassword = $('newPassword').value.trim();
      const confirmPassword = $('confirmPassword').value.trim();

      if (!newPassword || !confirmPassword) {
        showError('Введіть пароль у два поля');
        return;
      }

      if (newPassword.length < 4) {
        showError('Пароль має бути мінімум 4 символи');
        return;
      }

      if (newPassword !== confirmPassword) {
        showError('Паролі не співпадають');
        return;
      }

      const btn = $('submitBtn');
      btn.disabled = true;
      btn.innerText = 'Збереження...';

      try {
        const res = await fetch(`${WORKER_URL}/api/auth/reset-password`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            token,
            newPassword
          })
        });

        const data = await res.json().catch(() => null);

        if (!res.ok || !data?.success) {
          throw new Error(data?.error || 'SERVER_ERROR');
        }

        showSuccess('Пароль успішно змінено. Тепер можна увійти.');
        $('newPassword').value = '';
        $('confirmPassword').value = '';
        $('submitBtn').classList.add('hidden');
      } catch (err) {
        const msg =
          err.message === 'INVALID_OR_EXPIRED_TOKEN' ? 'Токен недійсний або протермінований' :
          err.message === 'WEAK_PASSWORD' ? 'Пароль занадто короткий' :
          'Не вдалося змінити пароль';
        showError(msg);
      } finally {
        if (!$('submitBtn').classList.contains('hidden')) {
          $('submitBtn').disabled = false;
          $('submitBtn').innerText = 'Зберегти новий пароль';
        }
      }
    });
  </script>
</body>
</html>
